name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: vars
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build release archive
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=tar.gz --output "dist/lacp-${{ steps.vars.outputs.version }}.tar.gz" "${{ steps.vars.outputs.tag }}"

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum "lacp-${{ steps.vars.outputs.version }}.tar.gz" > SHA256SUMS

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.vars.outputs.tag }}"
          TAR="dist/lacp-${{ steps.vars.outputs.version }}.tar.gz"
          SUMS="dist/SHA256SUMS"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${TAR}" "${SUMS}" --clobber
          else
            gh release create "${TAG}" "${TAR}" "${SUMS}" --generate-notes
          fi
